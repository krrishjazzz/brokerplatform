services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: krishjazz
      POSTGRES_PASSWORD: krishjazz
      POSTGRES_DB: krishjazz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krishjazz -d krishjazz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
